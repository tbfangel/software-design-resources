<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OKF Viewer</title>
<style>
/*__APP_CSS__*/
</style>
</head>
<body>
<header id="topbar">
  <div class="brand">
    <strong id="bundle-name"></strong>
    <span class="muted" id="result-count"></span>
  </div>
  <input id="search" type="search" placeholder="Search title, description, tags, text…" autocomplete="off" spellcheck="false">
  <div class="topbar-actions">
    <div id="viewtoggle" role="tablist" aria-label="View">
      <button id="view-list" type="button" class="vt active" role="tab" aria-selected="true">List</button>
      <button id="view-graph" type="button" class="vt" role="tab" aria-selected="false">Graph</button>
    </div>
    <label class="sort">Sort
      <select id="sort">
        <option value="date-desc">Newest</option>
        <option value="date-asc">Oldest</option>
        <option value="title">Title A–Z</option>
      </select>
    </label>
    <button id="clear-filters" type="button" class="ghost" hidden>Clear filters</button>
    <button id="theme-toggle" type="button" class="ghost" title="Toggle theme" aria-label="Toggle theme">◑</button>
  </div>
</header>

<main>
  <aside id="facets" aria-label="Filters"></aside>

  <section id="results" aria-label="Results"></section>

  <section id="graph" aria-label="Graph view" hidden>
    <canvas id="graph-canvas"></canvas>
    <div id="graph-legend" aria-hidden="true"></div>
    <div id="graph-info" aria-hidden="true" hidden></div>
    <div id="graph-hint" class="muted">drag to pan · scroll to zoom · click a node to open · drag a node to pin</div>
    <button id="graph-reset" type="button" class="ghost" title="Reset view">Reset view</button>
  </section>

  <section id="detail" aria-label="Card detail" hidden>
    <button id="detail-close" type="button" class="ghost" aria-label="Close detail">✕</button>
    <article id="detail-content"></article>
  </section>
</main>

<script>
window.BUNDLE = __BUNDLE_DATA__;
window.BUNDLE_NAME = __BUNDLE_NAME__;
</script>
<script>
/*__APP_JS__*/
</script>
</body>
</html>
